name: 构建 macOS 安装包

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json
      - pnpm-lock.yaml
      - electron/**
      - src/**
      - .github/workflows/build-macos.yml

permissions:
  contents: read

jobs:
  build-macos:
    name: macOS ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            label: Apple-Silicon
          - runner: macos-15-intel
            arch: x64
            label: Intel
    runs-on: ${{ matrix.runner }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建网页资源
        run: pnpm exec vite build

      - name: 准备 macOS FFmpeg
        run: |
          node -e "const fs=require('fs'); const source=require('@ffmpeg-installer/ffmpeg').path; fs.copyFileSync(source, 'ffmpeg-macos'); fs.chmodSync('ffmpeg-macos', 0o755); console.log(source)"
          ./ffmpeg-macos -version

      - name: 生成 DMG
        # 26.15.3 发布包错误地依赖了缺少 ElectronDownloadCacheMode 的
        # @electron/get 3.x；macOS 下载 Electron 时会在真正打包前崩溃。
        # 使用已验证的稳定构建器版本，应用本身的 Electron 版本保持不变。
        run: pnpm dlx electron-builder@26.0.12 --mac dmg --${{ matrix.arch }} --publish never

      - name: 挂载并验证安装包
        shell: bash
        run: |
          set -euo pipefail
          dmg_path="$(find dist -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          hdiutil verify "$dmg_path"
          mount_dir="$(mktemp -d)"
          trap 'hdiutil detach "$mount_dir" >/dev/null 2>&1 || true' EXIT
          hdiutil attach "$dmg_path" -nobrowse -mountpoint "$mount_dir"
          sleep 2
          ls -la "$mount_dir"
          app_path="$(find "$mount_dir" -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$app_path"
          test -d "$app_path"
          test -f "$app_path/Contents/Resources/app.asar"
          echo "app.asar 验证通过"
          test -x "$app_path/Contents/Resources/ffmpeg"
          echo "FFmpeg 可执行权限验证通过"
          "$app_path/Contents/Resources/ffmpeg" -version
          hdiutil detach "$mount_dir"
          trap - EXIT

      - name: 上传安装包
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: 剪影工坊-1.0.0-macOS-${{ matrix.label }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30
